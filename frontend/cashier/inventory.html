<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Restaurant POS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pos-container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-logo">🍽️ POS</div>
            <nav>
                <a href="home.html" class="nav-item">🧾 Orders</a>
                <a href="history.html" class="nav-item">📋 History</a>
                <a href="inventory.html" class="nav-item active">📦 Inventory</a>
            </nav>
            <div class="cashier-info" id="cashierInfo"></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="page-header">
                <h2>Inventory</h2>
                <div class="filter-tabs">
                    <button class="filter-btn active" onclick="filterInventory('all')">All Items</button>
                    <button class="filter-btn" onclick="filterInventory('low')">⚠️ Low Stock</button>
                </div>
            </div>

            <!-- INVENTORY SUMMARY -->
            <div class="summary-cards">
                <div class="summary-card">
                    <div class="summary-label">Total Items</div>
                    <div class="summary-value" id="totalItems">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Low Stock</div>
                    <div class="summary-value" style="color:#F39C12;" id="lowStockCount">0</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">Out of Stock</div>
                    <div class="summary-value" style="color:#E94560;" id="outOfStock">0</div>
                </div>
            </div>

            <!-- INVENTORY TABLE -->
            <div class="table-container">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Unit</th>
                            <th>Low Stock Alert</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="inventory.js"></script>
</body>
</html>
